<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Job Portal</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="/">JobPortal Pro</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/login.html">Login</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <h1>Create Account</h1>
      <p class="subtitle">Join Job Portal today</p>

      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" class="form-control" id="name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select class="form-control" id="role" required>
            <option value="jobseeker">Job Seeker</option>
            <option value="employer">Employer</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Register</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Login</a>
      </div>
    </div>
  </div>

  <div class="toast-box" id="toastBox"></div>

  <script>
    function toast(msg, type = "success") {
      const box = document.getElementById("toastBox");
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.textContent = msg;
      box.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    async function handleRegister(e) {
      e.preventDefault();
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          toast("Registered!");
          setTimeout(() => window.location.href = "/", 1000);
        } else {
          toast(data.error, "error");
        }
      } catch { toast("Server error", "error"); }
    }
  </script>
</body>
</html>
