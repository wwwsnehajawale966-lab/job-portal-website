<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Job Portal</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="/">JobPortal Pro</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/register.html">Register</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your account</p>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Login</button>
      </form>

      <div style="margin-top:1rem; padding:1rem; background:#f0f2f5; border-radius:8px; font-size:0.8rem; text-align:center; color:#636e72;">
        <strong>Demo:</strong> employer@test.com / rahul@test.com<br>Password: password123
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Register</a>
      </div>
    </div>
  </div>

  <div class="toast-box" id="toastBox"></div>

  <script>
    function toast(msg, type = "success") {
      const box = document.getElementById("toastBox");
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.textContent = msg;
      box.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    async function handleLogin(e) {
      e.preventDefault();
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          toast("Login successful!");
          setTimeout(() => window.location.href = "/", 1000);
        } else {
          toast(data.error, "error");
        }
      } catch { toast("Server error", "error"); }
    }
  </script>
</body>
</html>
